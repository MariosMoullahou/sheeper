{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'img/head.png' %}">
    <title>Sheeper</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <!-- Luxon (required by Tabulator date sorter) -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

    <style>
        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-300: #86efac;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
            --dark: #1a2e1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #fafaf5 !important;
        }

        /* Override Bootstrap primary to green */
        .btn-primary {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }
        .btn-primary:hover {
            background-color: var(--green-700) !important;
            border-color: var(--green-700) !important;
        }
        .btn-outline-primary {
            color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }
        .btn-outline-primary:hover {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
            color: #fff !important;
        }

        .btn-success {
            background-color: var(--green-500) !important;
            border-color: var(--green-500) !important;
        }
        .btn-success:hover {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            border-bottom: 1px solid var(--green-100);
        }

        /* Form controls focus */
        .form-control:focus, .form-select:focus {
            border-color: var(--green-400);
            box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.2);
        }

        /* Badge */
        .badge.bg-success {
            background-color: var(--green-500) !important;
        }

        /* Tabulator overrides */
        .tabulator {
            border: none !important;
            border-radius: 0 !important;
            overflow: hidden;
        }
        .tabulator .tabulator-header {
            background: linear-gradient(135deg, var(--green-600), var(--green-700)) !important;
            color: #fff !important;
            border: none !important;
        }
        .tabulator .tabulator-header .tabulator-col {
            background: transparent !important;
            border-right: 1px solid rgba(255,255,255,0.15) !important;
        }
        .tabulator .tabulator-header .tabulator-col-content .tabulator-col-title {
            color: #fff !important;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .tabulator .tabulator-header .tabulator-col .tabulator-col-sorter .tabulator-arrow {
            border-bottom-color: rgba(255,255,255,0.5) !important;
        }
        .tabulator .tabulator-row {
            border-bottom: 1px solid var(--green-100) !important;
            font-size: 0.9rem;
        }
        .tabulator .tabulator-row:hover {
            background-color: var(--green-50) !important;
        }
        .tabulator .tabulator-row.tabulator-row-even {
            background-color: #fafffe;
        }
        .tabulator .tabulator-footer {
            background: linear-gradient(135deg, var(--green-700), var(--green-600)) !important;
            color: #fff !important;
            border-top: none !important;
        }
        .tabulator .tabulator-footer-contents,
        .tabulator .tabulator-paginator {
            background: transparent !important;
            color: #fff !important;
        }
        .tabulator .tabulator-footer *,
        .tabulator .tabulator-footer .tabulator-page-counter,
        .tabulator .tabulator-footer .tabulator-paginator,
        .tabulator .tabulator-footer label,
        .tabulator .tabulator-footer select {
            color: #fff !important;
        }
        .tabulator .tabulator-footer select {
            background: rgba(255,255,255,0.15) !important;
            border: 1px solid rgba(255,255,255,0.25) !important;
        }
        .tabulator .tabulator-footer .tabulator-page {
            background: rgba(255,255,255,0.15) !important;
            border: 1px solid rgba(255,255,255,0.25) !important;
            color: #fff !important;
        }
        .tabulator .tabulator-footer .tabulator-page:hover:not(:disabled) {
            background: rgba(255,255,255,0.3) !important;
        }
        .tabulator .tabulator-footer .tabulator-page.active {
            background: #fff !important;
            color: var(--green-700) !important;
        }
        .tabulator .tabulator-footer .tabulator-page:disabled {
            opacity: 0.5 !important;
        }

        /* Mobile sidebar */
        @media (max-width: 767.98px) {
            .sidebar-desktop { display: none; }
        }
        @media (min-width: 768px) {
            .sidebar-toggle-btn { display: none !important; }
        }

        /* Mobile top bar */
        .mobile-topbar {
            background: linear-gradient(135deg, var(--green-700), var(--green-600));
        }
        .mobile-topbar .brand-text {
            color: #fff;
            font-weight: 600;
        }
    </style>

    {% block head %}{% endblock %}
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Mobile top bar -->
        <div class="col-12 d-md-none mobile-topbar p-2 d-flex align-items-center shadow-sm">
            <button class="btn btn-sm btn-outline-light sidebar-toggle-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="ms-2 brand-text d-flex align-items-center">
                <img src="{% static 'img/head.png' %}" height="28" class="me-2" alt="Logo" style="filter: brightness(0) invert(1);">Sheeper
            </span>
        </div>

        <!-- Sidebar (desktop) -->
        <div class="col-md-3 col-lg-2 p-0 sidebar-desktop">
            {% include 'sidebar.html' %}
        </div>

        <!-- Sidebar (mobile offcanvas) -->
        <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarOffcanvas">
            <div class="offcanvas-header bg-white">
                <h5 class="offcanvas-title">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body p-0">
                {% include 'sidebar.html' %}
            </div>
        </div>

        <!-- Main content area -->
        <main class="col-12 col-md-9 col-lg-10 p-3 p-md-4" style="min-width: 0; overflow-x: hidden;">
            <div class="container-fluid py-2 py-md-3">
                {% block page %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<!-- Sheep Profile Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="sheepProfilePanel" style="width: 480px; max-width: 90vw;">
    <div class="offcanvas-header" style="background: linear-gradient(135deg, var(--green-600), var(--green-700));">
        <h5 class="offcanvas-title text-white">
            <i class="bi bi-tag-fill me-2"></i><span id="sp-earing">—</span>
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0" id="sp-body">
        <!-- Loading -->
        <div id="sp-loading" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
        </div>

        <!-- Content (hidden until loaded) -->
        <div id="sp-content" class="d-none">

            <!-- Info Card -->
            <div class="p-3 border-bottom" style="background: var(--green-50);">
                <div class="row g-2 text-center">
                    <div class="col-4">
                        <small class="text-muted d-block">Gender</small>
                        <strong id="sp-gender">—</strong>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block">Birthdate</small>
                        <strong id="sp-birthdate">—</strong>
                    </div>
                    <div class="col-4">
                        <small class="text-muted d-block">Status</small>
                        <span id="sp-status"></span>
                    </div>
                </div>
                <div class="row g-2 text-center mt-1">
                    <div class="col-3">
                        <small class="text-muted d-block">Mother</small>
                        <span id="sp-mother">—</span>
                    </div>
                    <div class="col-3">
                        <small class="text-muted d-block">Father</small>
                        <span id="sp-father">—</span>
                    </div>
                    <div class="col-3">
                        <small class="text-muted d-block">Children</small>
                        <span id="sp-children-count">0</span>
                    </div>
                    <div class="col-3">
                        <small class="text-muted d-block">Group</small>
                        <span id="sp-group"></span>
                    </div>
                </div>
                <div class="mt-3">
                    <a id="sp-export-btn" href="#" target="_blank"
                       class="btn btn-sm w-100"
                       style="background: var(--green-700); color: #fff; font-size: 0.82rem;">
                        <i class="bi bi-file-earmark-excel me-1"></i>Export to Excel
                    </a>
                </div>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-tabs px-3 pt-2" role="tablist" style="font-size: 0.85rem;">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#sp-tab-health">
                        <i class="bi bi-heart-pulse me-1"></i>Health
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sp-tab-milk">
                        <i class="bi bi-droplet me-1"></i>Milk
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sp-tab-births">
                        <i class="bi bi-lightning me-1"></i>Births
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#sp-tab-family">
                        <i class="bi bi-diagram-3 me-1"></i>Family
                    </button>
                </li>
            </ul>

            <div class="tab-content p-3">
                <!-- Health Tab -->
                <div class="tab-pane fade show active" id="sp-tab-health">
                    <div id="sp-health-list"></div>
                </div>
                <!-- Milk Tab -->
                <div class="tab-pane fade" id="sp-tab-milk">
                    <div id="sp-milk-chart-wrap" class="mb-3" style="display:none;">
                        <canvas id="sp-milk-chart" height="160"></canvas>
                    </div>
                    <div id="sp-milk-list"></div>
                </div>
                <!-- Births Tab -->
                <div class="tab-pane fade" id="sp-tab-births">
                    <div id="sp-births-list"></div>
                </div>
                <!-- Family Tab -->
                <div class="tab-pane fade" id="sp-tab-family">
                    <div id="sp-family-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Global sheep profile panel
const sheepPanel = document.getElementById('sheepProfilePanel');
const spOffcanvas = new bootstrap.Offcanvas(sheepPanel);

function openSheepProfile(sheepId) {
    document.getElementById('sp-loading').classList.remove('d-none');
    document.getElementById('sp-content').classList.add('d-none');
    spOffcanvas.show();

    fetch(`/api/sheep/${sheepId}/profile/`)
        .then(r => r.json())
        .then(data => renderSheepProfile(data))
        .catch(() => {
            document.getElementById('sp-loading').innerHTML =
                '<div class="text-danger py-5 text-center">Failed to load sheep data.</div>';
        });
}

// Also support opening by earing (searches the sheep table API)
function openSheepByEaring(earing) {
    document.getElementById('sp-loading').classList.remove('d-none');
    document.getElementById('sp-content').classList.add('d-none');
    spOffcanvas.show();

    fetch('/api/sheep/')
        .then(r => r.json())
        .then(sheepList => {
            const sheep = sheepList.find(s => s.earing === earing);
            if (sheep) {
                fetch(`/api/sheep/${sheep.id}/profile/`)
                    .then(r => r.json())
                    .then(data => renderSheepProfile(data));
            } else {
                document.getElementById('sp-loading').innerHTML =
                    '<div class="text-warning py-5 text-center">Sheep not found.</div>';
            }
        });
}

function renderSheepProfile(data) {
    const info = data.info;

    // Header
    document.getElementById('sp-earing').textContent = info.earing;
    document.getElementById('sp-export-btn').href = `/sheep/${info.id}/export/`;
    document.getElementById('sp-gender').textContent = info.gender || '—';
    document.getElementById('sp-birthdate').textContent = info.birthdate || '—';
    document.getElementById('sp-status').innerHTML = info.is_active
        ? '<span class="badge bg-success">Active</span>'
        : '<span class="badge bg-secondary">Inactive</span>';

    // Group badge
    const GROUP_COLORS = {
        high:  { bg: '#dcfce7', text: '#166534' },
        med:   { bg: '#fef9c3', text: '#854d0e' },
        low:   { bg: '#ffedd5', text: '#9a3412' },
        dry:   { bg: '#f1f5f9', text: '#475569' },
        ram:   { bg: '#ede9fe', text: '#5b21b6' },
        ready: { bg: '#fce7f3', text: '#9d174d' },
    };
    const groupEl = document.getElementById('sp-group');
    if (info.group) {
        const c = GROUP_COLORS[info.group] || { bg: '#e5e7eb', text: '#374151' };
        const label = info.group.charAt(0).toUpperCase() + info.group.slice(1);
        groupEl.innerHTML = `<span style="background:${c.bg};color:${c.text};padding:2px 8px;border-radius:999px;font-size:0.78rem;font-weight:600;">${label}</span>`;
    } else {
        groupEl.innerHTML = '<span class="text-muted">—</span>';
    }

    // Mother (clickable)
    const motherEl = document.getElementById('sp-mother');
    if (info.mother) {
        motherEl.innerHTML = `<a href="#" class="text-decoration-none" style="color: var(--green-700); font-weight: 500;"
            onclick="event.preventDefault(); openSheepProfile(${info.mother_id})">${info.mother}</a>`;
    } else {
        motherEl.textContent = '—';
    }

    // Father (clickable)
    const fatherEl = document.getElementById('sp-father');
    if (fatherEl) {
        if (info.father) {
            fatherEl.innerHTML = `<a href="#" class="text-decoration-none" style="color: var(--green-700); font-weight: 500;"
                onclick="event.preventDefault(); openSheepProfile(${info.father_id})">${info.father}</a>`;
        } else {
            fatherEl.textContent = '—';
        }
    }

    document.getElementById('sp-children-count').textContent = data.children.length;

    // Health tab
    const healthHtml = data.health.length === 0
        ? '<p class="text-muted">No health records.</p>'
        : data.health.map(h => `
            <div class="d-flex align-items-start mb-2 p-2 rounded" style="background: ${h.is_batch ? '#fff7ed' : '#f0fdf4'}; font-size: 0.85rem;">
                <div class="flex-grow-1">
                    <div>
                        <span class="badge" style="background: var(--green-100); color: var(--green-700);">${h.record_type}</span>
                        ${h.is_batch ? '<span class="badge bg-warning text-dark">Batch</span>' : ''}
                        <strong class="ms-1">${h.title}</strong>
                    </div>
                    <small class="text-muted">${h.date}</small>
                    ${h.notes ? `<div class="text-muted mt-1">${h.notes}</div>` : ''}
                    ${h.next_due ? `<div class="mt-1"><i class="bi bi-bell me-1"></i>Next due: <span class="badge ${h.next_due <= new Date().toISOString().split('T')[0] ? 'bg-danger' : 'bg-success'}">${h.next_due}</span></div>` : ''}
                </div>
            </div>`).join('');
    document.getElementById('sp-health-list').innerHTML = healthHtml;

    // Milk tab
    const chartWrap = document.getElementById('sp-milk-chart-wrap');
    if (window._spMilkChart) { window._spMilkChart.destroy(); window._spMilkChart = null; }

    if (data.milk.length === 0) {
        chartWrap.style.display = 'none';
        document.getElementById('sp-milk-list').innerHTML = '<p class="text-muted">No milk records.</p>';
    } else {
        // Sort ascending for chart
        const sorted = [...data.milk].sort((a, b) => a.date.localeCompare(b.date));
        const labels = sorted.map(m => m.date);
        const values = sorted.map(m => parseFloat(m.milk));

        chartWrap.style.display = 'block';
        window._spMilkChart = new Chart(document.getElementById('sp-milk-chart'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Milk (L)',
                    data: values,
                    borderColor: '#16a34a',
                    backgroundColor: 'rgba(22,163,74,0.08)',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#16a34a',
                    fill: true,
                    tension: 0.3,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => ` ${ctx.parsed.y} L`
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                        grid: { display: false }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { font: { size: 11 }, callback: v => v + ' L' },
                        grid: { color: '#f0fdf4' }
                    }
                }
            }
        });

        // Table below chart (most recent first)
        document.getElementById('sp-milk-list').innerHTML =
            `<table class="table table-sm" style="font-size: 0.85rem;">
                <thead><tr><th>Date</th><th>Liters</th></tr></thead>
                <tbody>${data.milk.map(m =>
                    `<tr><td>${m.date}</td><td>${m.milk} L</td></tr>`
                ).join('')}</tbody>
             </table>`;
    }

    // Births tab
    let birthsHtml = '';
    if (data.born_in) {
        birthsHtml += `<div class="mb-3 p-2 rounded" style="background: #eff6ff; font-size: 0.85rem;">
            <i class="bi bi-star-fill text-primary me-1"></i><strong>Born in</strong> event on ${data.born_in.date}
            — mother: <a href="#" onclick="event.preventDefault(); openSheepByEaring('${data.born_in.mother}')"
                style="color: var(--green-700); font-weight: 500;">${data.born_in.mother}</a>
        </div>`;
    }
    if (data.births_as_mother.length > 0) {
        birthsHtml += data.births_as_mother.map(b => `
            <div class="mb-2 p-2 rounded" style="background: #fefce8; font-size: 0.85rem;">
                <strong>${b.date}</strong> — ${b.lambs.length} lamb(s)
                ${b.notes ? `<div class="text-muted">${b.notes}</div>` : ''}
                <div class="mt-1">${b.lambs.map(l =>
                    `<a href="#" class="badge me-1 text-decoration-none" style="background: var(--green-100); color: var(--green-700);"
                        onclick="event.preventDefault(); openSheepProfile(${l.id})">${l.earing}</a>`
                ).join('')}</div>
            </div>`).join('');
    }
    if (!birthsHtml) birthsHtml = '<p class="text-muted">No birth events.</p>';
    document.getElementById('sp-births-list').innerHTML = birthsHtml;

    // Family tab
    let familyHtml = '<div style="font-size: 0.85rem;">';
    if (info.mother) {
        familyHtml += `<div class="mb-3"><strong><i class="bi bi-arrow-up me-1"></i>Mother:</strong>
            <a href="#" class="text-decoration-none" style="color: var(--green-700); font-weight: 500;"
                onclick="event.preventDefault(); openSheepProfile(${info.mother_id})">${info.mother}</a></div>`;
    }
    if (data.children.length > 0) {
        familyHtml += '<div class="mb-2"><strong><i class="bi bi-arrow-down me-1"></i>Children:</strong></div>';
        familyHtml += data.children.map(c => `
            <div class="d-flex align-items-center mb-1 p-2 rounded" style="background: var(--green-50);">
                <a href="#" class="text-decoration-none flex-grow-1" style="color: var(--green-700); font-weight: 500;"
                    onclick="event.preventDefault(); openSheepProfile(${c.id})">${c.earing}</a>
                <small class="text-muted">${c.gender === 'F' ? 'Female' : c.gender === 'M' ? 'Male' : '—'}</small>
                <small class="text-muted ms-2">${c.birthdate || ''}</small>
            </div>`).join('');
    } else {
        familyHtml += '<p class="text-muted">No children.</p>';
    }
    familyHtml += '</div>';
    document.getElementById('sp-family-list').innerHTML = familyHtml;

    // Show content
    document.getElementById('sp-loading').classList.add('d-none');
    document.getElementById('sp-content').classList.remove('d-none');
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
