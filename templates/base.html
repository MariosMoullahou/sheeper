{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'img/head.png' %}">
    <title>Sheeper</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <!-- Luxon (required by Tabulator date sorter) -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

    <style>
        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-300: #86efac;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
            --dark: #1a2e1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--green-50) !important;
        }

        /* Override Bootstrap primary to green */
        .btn-primary {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }
        .btn-primary:hover {
            background-color: var(--green-700) !important;
            border-color: var(--green-700) !important;
        }
        .btn-outline-primary {
            color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }
        .btn-outline-primary:hover {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
            color: #fff !important;
        }

        .btn-success {
            background-color: var(--green-500) !important;
            border-color: var(--green-500) !important;
        }
        .btn-success:hover {
            background-color: var(--green-600) !important;
            border-color: var(--green-600) !important;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            border-bottom: 1px solid var(--green-100);
        }

        /* Form controls focus */
        .form-control:focus, .form-select:focus {
            border-color: var(--green-400);
            box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.2);
        }

        /* Badge */
        .badge.bg-success {
            background-color: var(--green-500) !important;
        }

        /* Tabulator overrides */
        .tabulator {
            border: none !important;
            border-radius: 8px;
            overflow: hidden;
        }
        .tabulator .tabulator-header {
            background: var(--green-700) !important;
            color: #fff !important;
            border: none !important;
        }
        .tabulator .tabulator-header .tabulator-col {
            background: transparent !important;
            border-right: 1px solid rgba(255,255,255,0.15) !important;
        }
        .tabulator .tabulator-header .tabulator-col-content .tabulator-col-title {
            color: #fff !important;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .tabulator .tabulator-header .tabulator-col .tabulator-col-sorter .tabulator-arrow {
            border-bottom-color: rgba(255,255,255,0.5) !important;
        }
        .tabulator .tabulator-row {
            border-bottom: 1px solid var(--green-100) !important;
            font-size: 0.9rem;
        }
        .tabulator .tabulator-row:hover {
            background-color: var(--green-50) !important;
        }
        .tabulator .tabulator-row.tabulator-row-even {
            background-color: #fafffe;
        }
        .tabulator .tabulator-footer {
            background: var(--green-50) !important;
            border-top: 2px solid var(--green-200) !important;
        }

        /* Mobile sidebar */
        @media (max-width: 767.98px) {
            .sidebar-desktop { display: none; }
        }
        @media (min-width: 768px) {
            .sidebar-toggle-btn { display: none !important; }
        }

        /* Mobile top bar */
        .mobile-topbar {
            background: linear-gradient(135deg, var(--green-700), var(--green-600));
        }
        .mobile-topbar .brand-text {
            color: #fff;
            font-weight: 600;
        }
    </style>

    {% block head %}{% endblock %}
</head>

<body>
<div class="container-fluid">
    <div class="row">
        <!-- Mobile top bar -->
        <div class="col-12 d-md-none mobile-topbar p-2 d-flex align-items-center shadow-sm">
            <button class="btn btn-sm btn-outline-light sidebar-toggle-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="ms-2 brand-text d-flex align-items-center">
                <img src="{% static 'img/head.png' %}" height="28" class="me-2" alt="Logo">Sheeper
            </span>
        </div>

        <!-- Sidebar (desktop) -->
        <div class="col-md-3 col-lg-2 p-0 sidebar-desktop">
            {% include 'sidebar.html' %}
        </div>

        <!-- Sidebar (mobile offcanvas) -->
        <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="sidebarOffcanvas">
            <div class="offcanvas-header bg-white">
                <h5 class="offcanvas-title">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body p-0">
                {% include 'sidebar.html' %}
            </div>
        </div>

        <!-- Main content area -->
        <main class="col-12 col-md-9 col-lg-10 p-3 p-md-4">
            <div class="container-fluid py-2 py-md-3">
                {% block page %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
