{% extends "base.html" %}
{% load static %}

{% block page %}
<div class="row g-3">

    <!-- TABLE -->
    <div class="col-12 col-lg-8 order-2 order-lg-1">
      <div class="card shadow-sm">
        <div class="card-header" style="background: var(--green-50);">
          <h5 class="mb-0" style="color: var(--green-800);"><i class="bi bi-lightning-fill me-2"></i>Birth Events</h5>
        </div>
        <div class="card-body p-0 p-md-3">
          <div id="birth-table"></div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="col-12 col-lg-4 order-1 order-lg-2">
      <div class="card shadow-sm">
        <div class="card-header text-white" style="background: linear-gradient(135deg, var(--green-600), var(--green-700));">
          <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>New Birth Event</h5>
        </div>
        <div class="card-body">
          <form id="birthevent-form">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Mother (Earing Tag)</label>
              <input type="text" class="form-control" name="mother" placeholder="Mother earing tag" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Birthdate</label>
              <input type="date" class="form-control" name="date" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Optional notes"></textarea>
            </div>

            <div id="lambs-container" class="mb-2">
              <label class="form-label">New Lambs</label>
              <div class="lamb-row d-flex gap-2 mb-2">
                <input type="text" class="form-control lamb-input" placeholder="Lamb earing tag">
                <select class="form-select lamb-gender" style="max-width: 110px;">
                  <option value="" selected>Gender</option>
                  <option value="F">Female</option>
                  <option value="M">Male</option>
                </select>
              </div>
            </div>

            <button type="button" class="btn btn-outline-secondary btn-sm mb-3" id="add-lamb-btn">
              <i class="bi bi-plus me-1"></i>Add Another Lamb
            </button>

            <div id="form-error" class="alert alert-danger d-none mb-3" role="alert"></div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-check-lg me-1"></i>Save Event
            </button>
          </form>
        </div>
      </div>
    </div>

</div>

<script>
const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
const formError = document.getElementById('form-error');

function showError(msg) {
    formError.textContent = msg;
    formError.classList.remove('d-none');
}
function hideError() {
    formError.classList.add('d-none');
}

// --- Add / Remove lamb fields ---
document.getElementById('add-lamb-btn').addEventListener('click', function() {
    const container = document.getElementById('lambs-container');
    const row = document.createElement('div');
    row.className = 'lamb-row d-flex gap-2 mb-2';
    row.innerHTML =
        '<input type="text" class="form-control lamb-input" placeholder="Lamb earing tag">' +
        '<select class="form-select lamb-gender" style="max-width: 110px;">' +
        '<option value="" selected>Gender</option>' +
        '<option value="F">Female</option>' +
        '<option value="M">Male</option></select>' +
        '<button type="button" class="btn btn-outline-danger btn-sm remove-lamb-btn">' +
        '<i class="bi bi-x-lg"></i></button>';
    container.appendChild(row);
    row.querySelector('.remove-lamb-btn').addEventListener('click', function() {
        row.remove();
    });
});

// --- Submit form ---
document.getElementById('birthevent-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideError();

    const form = e.target;
    const newLambs = [];
    form.querySelectorAll('.lamb-row').forEach(row => {
        const earing = row.querySelector('.lamb-input').value.trim();
        const gender = row.querySelector('.lamb-gender').value;
        if (earing) newLambs.push({earing: earing, gender: gender || ''});
    });

    const payload = {
        mother: form.querySelector('[name=mother]').value.trim(),
        date: form.querySelector('[name=date]').value,
        notes: form.querySelector('[name=notes]').value.trim(),
        new_lambs: newLambs,
    };

    if (!payload.mother) { showError('Mother earing tag is required.'); return; }
    if (!payload.date) { showError('Birthdate is required.'); return; }

    const response = await fetch("{% url 'birthevent-data-api' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(payload)
    });

    if (response.ok) {
        table.replaceData();

        // Reset form
        form.reset();
        const container = document.getElementById('lambs-container');
        const rows = container.querySelectorAll('.lamb-row');
        rows.forEach((row, i) => { if (i > 0) row.remove(); });
        container.querySelector('.lamb-input').value = '';
    } else {
        const errors = await response.json();
        const msg = typeof errors === 'object'
            ? Object.entries(errors).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join('\n')
            : String(errors);
        showError(msg);
    }
});

async function inlineEdit(cell, apiBase) {
    const rowData = cell.getRow().getData();
    const field = cell.getField();
    let value = cell.getValue();
    if (value === undefined || value === null) value = '';
    const response = await fetch(`${apiBase}${rowData.id}/`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify({ [field]: value }),
    });
    if (!response.ok) {
        const err = await response.json();
        const msg = typeof err === 'object' ? Object.values(err).flat().join(', ') : String(err);
        alert('Save failed: ' + msg);
        cell.restoreOldValue();
    }
}

// --- Tabulator ---
var table = new Tabulator("#birth-table", {
    ajaxURL: "{% url 'birthevent-data-api' %}",
    ajaxResponse: function(url, params, response) {
        return response;
    },
    layout: "fitDataFill",
    height: "520px",
    addRowPos: "top",
    pagination: "local",
    paginationSize: 15,
    paginationCounter: "rows",
    movableColumns: true,
    initialSort: [
        {column: "date", dir: "desc"},
    ],
    columns: [
        {title: "ID", field: "id", sorter: "number", width: 65, hozAlign: "center"},
        {title: "Mother", field: "mother", sorter: "string", width: 120,
            formatter: function(cell) {
                const val = cell.getValue();
                if (!val) return '—';
                return `<a href="#" onclick="event.preventDefault(); openSheepByEaring('${val}')" style="color: var(--green-700); font-weight: 500; text-decoration: none;">${val}</a>`;
            }
        },
        {title: "Birthdate", field: "date", sorter: "date", width: 120, editor: "date"},
        {
            title: "Lambs",
            field: "lambs",
            width: 200,
            headerSort: false,
            formatter: function(cell) {
                const lambs = cell.getValue();
                if (!lambs || lambs.length === 0) return '<span class="text-muted">none</span>';
                return lambs.map(function(tag) {
                    return '<a href="#" onclick="event.preventDefault(); openSheepByEaring(\'' + tag + '\')" class="badge text-decoration-none" style="background: var(--green-100); color: var(--green-700); margin-right: 4px; cursor: pointer;">' + tag + '</a>';
                }).join('');
            }
        },
        {title: "Notes", field: "notes", sorter: "string", minWidth: 150, editor: "input",
            formatter: function(cell) {
                const val = cell.getValue();
                return val ? val : '<span class="text-muted">-</span>';
            }
        },
        {
          title: "",
          formatter: () => '<button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>',
          width: 60,
          hozAlign: "center",
          headerSort: false,
          cellClick: async (e, cell) => {
              const rowData = cell.getRow().getData();
              if (!confirm(`Delete birth event #${rowData.id} (mother: ${rowData.mother})?`)) return;

              const response = await fetch(`/api/birthevent/${rowData.id}/`, {
                  method: "DELETE",
                  headers: { "X-CSRFToken": csrfToken }
              });

              if (response.ok) {
                  cell.getRow().delete();
              } else {
                  alert("Failed to delete birth event.");
              }
          }
        }
    ],
});

table.on("cellEdited", function(cell) {
    inlineEdit(cell, '/api/birthevent/');
});
</script>

{% endblock %}
