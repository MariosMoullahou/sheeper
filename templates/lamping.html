{% extends "base.html" %}
{% load static %}

{% block page %}
<div class="row g-3">

    <!-- TABLE -->
    <div class="col-12 col-lg-8 order-2 order-lg-1">
      <div class="card shadow-sm">
        <div class="card-header" style="background: var(--green-50);">
          <h5 class="mb-0" style="color: var(--green-800);"><i class="bi bi-lightning-fill me-2"></i>Birth Events</h5>
        </div>
        <div class="card-body p-0 p-md-3">
          <div id="birth-table"></div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="col-12 col-lg-4 order-1 order-lg-2">
      <div class="card shadow-sm">
        <div class="card-header text-white" style="background: linear-gradient(135deg, var(--green-600), var(--green-700));">
          <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Birth Event</h5>
        </div>
        <div class="card-body">
          <form id="birthevent-form">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Mother (Earing Tag)</label>
              <input type="text" class="form-control" name="mother" placeholder="Mother earing tag" required>
            </div>

            <div id="lambs-container">
              <label class="form-label">Lambs</label>
              <div class="mb-2">
                <input type="text" class="form-control lamb-input" placeholder="Lamb earing tag">
              </div>
            </div>

            <button type="button" class="btn btn-outline-secondary btn-sm mb-3" id="add-lamb-btn">
              <i class="bi bi-plus me-1"></i>Add Another Lamb
            </button>

            <div class="mb-3">
              <label class="form-label">Birthdate</label>
              <input type="date" class="form-control" name="date" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-check-lg me-1"></i>Save Event
            </button>
          </form>
        </div>
      </div>
    </div>

</div>

<script>
// Add lamb field
document.getElementById('add-lamb-btn').addEventListener('click', function() {
    const container = document.getElementById('lambs-container');
    const div = document.createElement('div');
    div.className = 'mb-2';
    div.innerHTML = '<input type="text" class="form-control lamb-input" placeholder="Lamb earing tag">';
    container.appendChild(div);
});

// Submit form
document.getElementById('birthevent-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;
    const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]').value;

    const lambs = [];
    form.querySelectorAll('.lamb-input').forEach(input => {
        if (input.value.trim()) lambs.push(input.value.trim());
    });

    const payload = {
        mother: form.querySelector('[name=mother]').value,
        lambs: lambs,
        date: form.querySelector('[name=date]').value
    };

    const response = await fetch("{% url 'birthevent-data-api' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(payload)
    });

    if (response.ok) {
        const data = await response.json();
        table.updateOrAddData([data]);

        // Reset form and lambs
        form.reset();
        const container = document.getElementById('lambs-container');
        const lambDivs = container.querySelectorAll('.mb-2');
        lambDivs.forEach((div, i) => { if (i > 0) div.remove(); });
        container.querySelector('.lamb-input').value = '';
    } else {
        const errors = await response.json();
        alert("Error: " + JSON.stringify(errors));
    }
});

var table = new Tabulator("#birth-table", {
    ajaxURL: "/api/birthevent/",
    layout: "fitColumns",
    responsiveLayout: "collapse",
    addRowPos: "top",
    pagination: "local",
    paginationSize: 10,
    paginationCounter: "rows",
    movableColumns: true,
    initialSort: [
        {column: "date", dir: "desc"},
    ],
    columns: [
        {title: "Mother Earing", field: "mother", minWidth: 100},
        {title: "Birthdate", field: "date", sorter: "date", minWidth: 100},
        {title: "Lambs", field: "lambs", minWidth: 120},
    ],
});
</script>

{% endblock %}
