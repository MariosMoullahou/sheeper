{% extends "base.html" %}
{% load static %}

{% block page %}
<div class="row g-3">

    <!-- TABLE -->
    <div class="col-12 col-lg-8 order-2 order-lg-1">
      <div class="card shadow-sm">
        <div class="card-header" style="background: var(--green-50);">
          <h5 class="mb-0" style="color: var(--green-800);"><i class="bi bi-droplet-fill me-2"></i>Milk Records</h5>
        </div>
        <div class="card-body p-0 p-md-3">
          <div id="milk-table"></div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="col-12 col-lg-4 order-1 order-lg-2">
      <div class="card shadow-sm">
        <div class="card-header text-white" style="background: linear-gradient(135deg, var(--green-600), var(--green-700));">
          <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Milking Measurement</h5>
        </div>
        <div class="card-body">
          <form id="milk-form">
            {% csrf_token %}

            <div class="mb-3">
              <label for="sheep_id" class="form-label">Sheep Earing Tag</label>
              <input id="sheep_id" name="sheep" type="text" class="form-control" placeholder="Earing tag" required>
            </div>

            <div class="mb-3">
              <label for="sheep_milk" class="form-label">Milk Measurement</label>
              <input id="sheep_milk" name="milk" type="number" step="0.01" class="form-control" placeholder="Liters" required>
            </div>

            <div class="mb-3">
              <label for="milk_date" class="form-label">Date</label>
              <input id="milk_date" name="date" type="date" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-check-lg me-1"></i>Save
            </button>
          </form>
        </div>
      </div>
    </div>

</div>

<script>
const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

document.getElementById('milk-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const form = e.target;
    const formData = {};
    form.querySelectorAll('input, select, textarea').forEach(input => {
        if (input.name && input.name !== 'csrfmiddlewaretoken') formData[input.name] = input.value;
    });

    const response = await fetch("{% url 'milking-api' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(formData)
    });

    if (response.ok) {
        const data = await response.json();
        table.updateOrAddData([data]);
        form.reset();
    } else {
        const errors = await response.json();
        alert("Error: " + JSON.stringify(errors));
    }
});

async function inlineEdit(cell, apiBase) {
    const rowData = cell.getRow().getData();
    const field = cell.getField();
    let value = cell.getValue();
    if (value === undefined || value === null) value = '';
    const response = await fetch(`${apiBase}${rowData.id}/`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify({ [field]: value }),
    });
    if (!response.ok) {
        const err = await response.json();
        const msg = typeof err === 'object' ? Object.values(err).flat().join(', ') : String(err);
        alert('Save failed: ' + msg);
        cell.restoreOldValue();
    }
}

var table = new Tabulator("#milk-table", {
    ajaxURL: "/api/milk/",
    layout: "fitColumns",
    responsiveLayout: "collapse",
    addRowPos: "top",
    pagination: "local",
    paginationSize: 10,
    paginationCounter: "rows",
    movableColumns: true,
    initialSort: [
        {column: "date", dir: "desc"},
    ],
    columns: [
        {title: "ID", field: "id", width: 60},
        {title: "Sheep Earing", field: "sheep", minWidth: 100, editor: "input",
            formatter: function(cell) {
                const val = cell.getValue();
                if (!val) return '—';
                return `<a href="#" onclick="event.preventDefault(); openSheepByEaring('${val}')" style="color: var(--green-700); font-weight: 500; text-decoration: none;">${val}</a>`;
            }
        },
        {title: "Date", field: "date", sorter: "date", minWidth: 100, editor: "date"},
        {title: "Milk (L)", field: "milk", minWidth: 80, editor: "number", editorParams: {step: 0.01}},
        {title: "Active", field: "is_active", formatter: "tickCross", width: 70, hozAlign: "center", editor: "tickCross"},
        {
          title: "",
          formatter: () => '<button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>',
          width: 60,
          hozAlign: "center",
          headerSort: false,
          cellClick: async (e, cell) => {
              const rowData = cell.getRow().getData();
              if (!confirm(`Are you sure you want to delete milk record #${rowData.id}?`)) return;

              const response = await fetch(`/api/milk/${rowData.id}/`, {
                  method: "DELETE",
                  headers: { "X-CSRFToken": csrfToken }
              });

              if (response.ok) {
                  cell.getRow().delete();
              } else {
                  alert("Failed to delete milk record.");
              }
          }
        }
    ],
});

table.on("cellEdited", function(cell) {
    inlineEdit(cell, '/api/milk/');
});
</script>

{% endblock %}
