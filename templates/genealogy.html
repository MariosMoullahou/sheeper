{% extends "base.html" %}
{% load static %}

{% block page %}
<style>
    #genealogy-controls {
        display: flex;
        gap: 0.6rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 1rem;
    }
    #genealogy-controls select,
    #genealogy-controls input {
        font-size: 0.85rem;
        padding: 0.35rem 0.6rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
    }
    #tree-container {
        width: 100%;
        height: calc(100vh - 200px);
        min-height: 400px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fafafa;
        overflow: hidden;
        position: relative;
    }
    #tree-container svg {
        width: 100%;
        height: 100%;
    }

    .node rect {
        stroke-width: 1.5px;
        cursor: pointer;
        rx: 6;
        ry: 6;
    }
    .node text {
        font-size: 11px;
        font-family: 'Poppins', sans-serif;
    }
    .link {
        fill: none;
        stroke-width: 1.5px;
    }
    .link-mother { stroke: #e879a0; }
    .link-father { stroke: #60a5fa; }

    .legend {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: rgba(255,255,255,0.92);
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 0.75rem;
        display: flex;
        gap: 12px;
    }
    .legend span {
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .legend-line {
        width: 20px;
        height: 2px;
        display: inline-block;
    }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 style="color: var(--green-800); font-weight: 700; margin: 0;">
        <i class="bi bi-diagram-3 me-2"></i>Family Tree
    </h5>
</div>

<div id="genealogy-controls">
    <input type="text" id="search-sheep" placeholder="Search earing..." style="width: 180px;">
    <select id="filter-gender">
        <option value="">All Genders</option>
        <option value="F">Female</option>
        <option value="M">Male</option>
    </select>
    <button id="btn-reset" class="btn btn-sm btn-outline-secondary">Reset View</button>
    <button id="btn-zoom-in" class="btn btn-sm btn-outline-secondary"><i class="bi bi-zoom-in"></i></button>
    <button id="btn-zoom-out" class="btn btn-sm btn-outline-secondary"><i class="bi bi-zoom-out"></i></button>
</div>

<div id="tree-container">
    <svg></svg>
    <div class="legend">
        <span><span class="legend-line" style="background: #e879a0;"></span> Mother</span>
        <span><span class="legend-line" style="background: #60a5fa;"></span> Father</span>
        <span><span style="width:12px;height:12px;border-radius:3px;background:#fce7f3;border:1.5px solid #db2777;display:inline-block;"></span> Female</span>
        <span><span style="width:12px;height:12px;border-radius:3px;background:#dbeafe;border:1.5px solid #2563eb;display:inline-block;"></span> Male</span>
        <span><span style="width:12px;height:12px;border-radius:3px;background:#f3f4f6;border:1.5px solid #9ca3af;display:inline-block;"></span> Unknown</span>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const COLORS = {
    F: { fill: '#fce7f3', stroke: '#db2777', text: '#9d174d' },
    M: { fill: '#dbeafe', stroke: '#2563eb', text: '#1e40af' },
    U: { fill: '#f3f4f6', stroke: '#9ca3af', text: '#374151' },
};
const NODE_W = 110, NODE_H = 44, LEVEL_H = 100;

let allData = [];
let svg, g, zoom;

async function loadData() {
    const res = await fetch("{% url 'genealogy-api' %}");
    allData = await res.json();
    renderTree(allData);
}

function buildHierarchies(data) {
    const byId = new Map(data.map(d => [d.id, {...d, children: []}]));

    // Find all sheep that are parents
    data.forEach(d => {
        if (d.mother_id && byId.has(d.mother_id)) {
            byId.get(d.mother_id).children.push(byId.get(d.id));
        }
    });

    // Roots = sheep with no mother in the dataset
    const roots = data
        .filter(d => !d.mother_id || !byId.has(d.mother_id))
        .map(d => byId.get(d.id));

    return { roots, byId };
}

function renderTree(data) {
    const container = document.getElementById('tree-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    d3.select('#tree-container svg').selectAll('*').remove();

    svg = d3.select('#tree-container svg')
        .attr('width', width)
        .attr('height', height);

    g = svg.append('g');

    zoom = d3.zoom()
        .scaleExtent([0.1, 3])
        .on('zoom', (e) => g.attr('transform', e.transform));
    svg.call(zoom);

    const { roots, byId } = buildHierarchies(data);

    if (roots.length === 0) {
        g.append('text')
            .attr('x', width / 2)
            .attr('y', height / 2)
            .attr('text-anchor', 'middle')
            .style('fill', '#9ca3af')
            .style('font-size', '14px')
            .text('No sheep data to display');
        return;
    }

    // Layout each root tree side by side
    let offsetX = 40;
    const allNodes = [];
    const allLinks = [];

    roots.forEach(root => {
        const hierarchy = d3.hierarchy(root);
        const treeLayout = d3.tree()
            .nodeSize([NODE_W + 20, LEVEL_H]);

        treeLayout(hierarchy);

        // Shift nodes by offsetX
        const nodes = hierarchy.descendants();
        const links = hierarchy.links();

        // Find bounds for this tree
        let minX = Infinity, maxX = -Infinity;
        nodes.forEach(n => {
            if (n.x < minX) minX = n.x;
            if (n.x > maxX) maxX = n.x;
        });

        const shift = offsetX - minX;
        nodes.forEach(n => {
            n.x += shift;
            n.finalX = n.x;
            n.finalY = n.y + 40;
        });

        offsetX = maxX + shift + NODE_W + 60;

        allNodes.push(...nodes);
        allLinks.push(...links);
    });

    // Draw father links (dashed)
    data.forEach(d => {
        if (d.father_id && byId.has(d.father_id)) {
            const childNode = allNodes.find(n => n.data.id === d.id);
            const fatherNode = allNodes.find(n => n.data.id === d.father_id);
            if (childNode && fatherNode) {
                allLinks.push({
                    source: fatherNode,
                    target: childNode,
                    isFather: true,
                });
            }
        }
    });

    // Draw links
    g.selectAll('.link')
        .data(allLinks)
        .enter()
        .append('path')
        .attr('class', d => 'link ' + (d.isFather ? 'link-father' : 'link-mother'))
        .attr('stroke-dasharray', d => d.isFather ? '5,3' : 'none')
        .attr('d', d => {
            const sx = d.source.finalX + NODE_W / 2;
            const sy = d.source.finalY + NODE_H;
            const tx = d.target.finalX + NODE_W / 2;
            const ty = d.target.finalY;
            const my = (sy + ty) / 2;
            return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
        });

    // Draw nodes
    const nodeGroups = g.selectAll('.node')
        .data(allNodes)
        .enter()
        .append('g')
        .attr('class', 'node')
        .attr('transform', d => `translate(${d.finalX},${d.finalY})`)
        .on('click', (e, d) => highlightFamily(d, allNodes, allLinks));

    nodeGroups.append('rect')
        .attr('width', NODE_W)
        .attr('height', NODE_H)
        .attr('fill', d => COLORS[d.data.gender]?.fill || COLORS.U.fill)
        .attr('stroke', d => COLORS[d.data.gender]?.stroke || COLORS.U.stroke);

    // Earing label
    nodeGroups.append('text')
        .attr('x', NODE_W / 2)
        .attr('y', 18)
        .attr('text-anchor', 'middle')
        .attr('fill', d => COLORS[d.data.gender]?.text || COLORS.U.text)
        .style('font-weight', '600')
        .text(d => d.data.earing);

    // Info line
    nodeGroups.append('text')
        .attr('x', NODE_W / 2)
        .attr('y', 33)
        .attr('text-anchor', 'middle')
        .attr('fill', '#6b7280')
        .style('font-size', '9px')
        .text(d => {
            const parts = [];
            if (d.data.gender === 'F') parts.push('\u2640');
            else if (d.data.gender === 'M') parts.push('\u2642');
            if (d.data.birthdate) parts.push(d.data.birthdate);
            if (!d.data.is_active) parts.push('inactive');
            return parts.join(' \u00b7 ');
        });

    // Auto-fit
    const bounds = g.node().getBBox();
    const fullWidth = bounds.width + 80;
    const fullHeight = bounds.height + 80;
    const scale = Math.min(width / fullWidth, height / fullHeight, 1);
    const tx = (width - bounds.width * scale) / 2 - bounds.x * scale;
    const ty = (height - bounds.height * scale) / 2 - bounds.y * scale;
    svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function highlightFamily(clicked, allNodes, allLinks) {
    const id = clicked.data.id;

    // Reset all
    g.selectAll('.node rect').attr('opacity', 0.25);
    g.selectAll('.node text').attr('opacity', 0.25);
    g.selectAll('.link').attr('opacity', 0.08);

    // Find related IDs
    const related = new Set([id]);
    if (clicked.data.mother_id) related.add(clicked.data.mother_id);
    if (clicked.data.father_id) related.add(clicked.data.father_id);
    allNodes.forEach(n => {
        if (n.data.mother_id === id || n.data.father_id === id) {
            related.add(n.data.id);
        }
    });

    // Highlight related nodes
    g.selectAll('.node').each(function(d) {
        if (related.has(d.data.id)) {
            d3.select(this).selectAll('rect').attr('opacity', 1);
            d3.select(this).selectAll('text').attr('opacity', 1);
            if (d.data.id === id) {
                d3.select(this).select('rect').attr('stroke-width', 3);
            }
        }
    });

    // Highlight related links
    g.selectAll('.link').each(function(d) {
        if (related.has(d.source.data.id) && related.has(d.target.data.id)) {
            d3.select(this).attr('opacity', 1).attr('stroke-width', 2.5);
        }
    });

    // Click background to reset
    svg.on('click.reset', (e) => {
        if (e.target === svg.node()) {
            resetHighlight();
            svg.on('click.reset', null);
        }
    });
}

function resetHighlight() {
    g.selectAll('.node rect').attr('opacity', 1).attr('stroke-width', 1.5);
    g.selectAll('.node text').attr('opacity', 1);
    g.selectAll('.link').attr('opacity', 1).attr('stroke-width', 1.5);
}

// Controls
document.getElementById('search-sheep').addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    if (!query) {
        resetHighlight();
        return;
    }
    g.selectAll('.node').each(function(d) {
        const match = d.data.earing.toLowerCase().includes(query);
        d3.select(this).selectAll('rect, text').attr('opacity', match ? 1 : 0.15);
        if (match) {
            d3.select(this).select('rect').attr('stroke-width', 3);
        }
    });
});

document.getElementById('filter-gender').addEventListener('change', function() {
    const gender = this.value;
    const filtered = gender ? allData.filter(d => d.gender === gender) : allData;
    // Keep all but dim non-matching
    if (!gender) {
        resetHighlight();
    } else {
        const ids = new Set(filtered.map(d => d.id));
        g.selectAll('.node').each(function(d) {
            const match = ids.has(d.data.id);
            d3.select(this).selectAll('rect, text').attr('opacity', match ? 1 : 0.15);
        });
    }
});

document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('search-sheep').value = '';
    document.getElementById('filter-gender').value = '';
    resetHighlight();
    // Re-fit
    const bounds = g.node().getBBox();
    const container = document.getElementById('tree-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    const scale = Math.min(width / (bounds.width + 80), height / (bounds.height + 80), 1);
    const tx = (width - bounds.width * scale) / 2 - bounds.x * scale;
    const ty = (height - bounds.height * scale) / 2 - bounds.y * scale;
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
});

document.getElementById('btn-zoom-in').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 1.3);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 0.7);
});

loadData();
</script>
{% endblock %}
