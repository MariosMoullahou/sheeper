<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/head.png' %}">
    <title>Sheeper - Select Farm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 450px;">
            <div class="card-body">
                <h3 class="text-center mb-3">Select a Farm</h3>

                {% if messages %}
                  {% for message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                  {% endfor %}
                {% endif %}

                {% if farms %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="list-group mb-3">
                        {% for farm in farms %}
                        <label class="list-group-item">
                            <input type="radio" name="farm_id" value="{{ farm.pk }}" class="form-check-input me-2" required>
                            {{ farm.name }}
                        </label>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Continue</button>
                </form>
                {% else %}
                <p class="text-center text-muted">No farms available. Ask an admin to add you to a farm.</p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
