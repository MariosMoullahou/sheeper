{% extends "base.html" %}
{% load static %}

{% block page %}
<div class="row g-3">

    <!-- TABLE -->
    <div class="col-12 col-lg-8 order-2 order-lg-1">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center" style="background: var(--green-50);">
          <h5 class="mb-0" style="color: var(--green-800);"><i class="bi bi-list-ul me-2"></i>Sheep List</h5>
          <button id="btn-recalculate" class="btn btn-sm btn-outline-secondary" title="Recalculate groups based on milk records">
            <i class="bi bi-arrow-repeat me-1"></i>Recalculate Groups
          </button>
        </div>
        <div class="card-body p-0 p-md-3" style="overflow-x: auto;">
          <div id="sheep-table"></div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="col-12 col-lg-4 order-1 order-lg-2">
      <div class="card shadow-sm">
        <div class="card-header text-white" style="background: linear-gradient(135deg, var(--green-600), var(--green-700));">
          <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Create Sheep</h5>
        </div>
        <div class="card-body">
          <form id="sheep-form">
            {% csrf_token %}

            <div class="mb-3">
              <label for="sheep_earing" class="form-label">Earing Tag</label>
              <input id="sheep_earing" name="earing" type="text" class="form-control" placeholder="e.g. 1234" required>
            </div>

            <div class="mb-3">
              <label for="sheep_gender" class="form-label">Gender</label>
              <select id="sheep_gender" name="gender" class="form-select" required>
                <option value="" disabled selected>Select gender</option>
                <option value="F">Female</option>
                <option value="M">Male</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="sheep_birthdate" class="form-label">Birthdate</label>
              <input id="sheep_birthdate" name="birthdate" type="date" class="form-control">
            </div>

            <div class="mb-3">
              <label for="sheep_mother" class="form-label">Mother (Earing Tag)</label>
              <input id="sheep_mother" name="mother" type="text" class="form-control" placeholder="Mother earing tag">
            </div>

            <button type="submit" class="btn btn-success w-100">
              <i class="bi bi-check-lg me-1"></i>Save
            </button>
          </form>
        </div>
      </div>
    </div>

</div>

<script>
    const GROUP_COLORS = {
        high:  { bg: '#dcfce7', text: '#166534' },
        med:   { bg: '#fef9c3', text: '#854d0e' },
        low:   { bg: '#ffedd5', text: '#9a3412' },
        dry:   { bg: '#f1f5f9', text: '#475569' },
        ram:   { bg: '#ede9fe', text: '#5b21b6' },
        ready: { bg: '#fce7f3', text: '#9d174d' },
    };

    function groupBadge(value) {
        if (!value) return '<span class="text-muted">—</span>';
        const c = GROUP_COLORS[value] || { bg: '#e5e7eb', text: '#374151' };
        const label = value.charAt(0).toUpperCase() + value.slice(1);
        return `<span style="background:${c.bg};color:${c.text};padding:2px 8px;border-radius:999px;font-size:0.78rem;font-weight:600;">${label}</span>`;
    }

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    document.getElementById('sheep-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const form = e.target;
      const formData = {};
      form.querySelectorAll('input, select, textarea').forEach(input => {
          if (input.name && input.name !== 'csrfmiddlewaretoken') formData[input.name] = input.value;
      });

      const response = await fetch("{% url 'sheep-data-api' %}", {
          method: "POST",
          headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken
          },
          body: JSON.stringify(formData)
      });

      if (response.ok) {
          const data = await response.json();
          table.updateOrAddData([data]);
          form.reset();
      } else {
          const errors = await response.json();
          alert("Error: " + JSON.stringify(errors));
      }
    });

    async function inlineEdit(cell, apiBase) {
        const rowData = cell.getRow().getData();
        const field = cell.getField();
        let value = cell.getValue();
        if (value === undefined || value === null) value = '';
        const response = await fetch(`${apiBase}${rowData.id}/`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({ [field]: value }),
        });
        if (!response.ok) {
            const err = await response.json();
            const msg = typeof err === 'object' ? Object.values(err).flat().join(', ') : String(err);
            alert('Save failed: ' + msg);
            cell.restoreOldValue();
        }
    }

    var table = new Tabulator("#sheep-table", {
        ajaxURL: "/api/sheep/",
        layout: "fitDataFill",
        height: "520px",
        addRowPos: "top",
        pagination: "local",
        paginationSize: 15,
        paginationCounter: "rows",
        movableColumns: true,
        initialSort: [
            {column: "earing", dir: "asc"},
        ],
        columns: [
            {title: "Earing", field: "earing", sorter: "string", width: 110, editor: "input",
                formatter: function(cell) {
                    const row = cell.getRow().getData();
                    return `<a href="#" onclick="event.preventDefault(); openSheepProfile(${row.id})" style="color: var(--green-700); font-weight: 500; text-decoration: none;">${cell.getValue()}</a>`;
                }
            },
            {title: "Birthdate", field: "birthdate", sorter: "date", width: 120, editor: "date"},
            {title: "Gender", field: "gender", sorter: "string", width: 90, editor: "list", editorParams: {values: {"M": "M", "F": "F"}}},
            {title: "Mother", field: "mother", sorter: "string", width: 110, editor: "input",
                formatter: function(cell) {
                    const val = cell.getValue();
                    if (!val) return '<span class="text-muted">—</span>';
                    return `<a href="#" onclick="event.preventDefault(); openSheepByEaring('${val}')" style="color: var(--green-700); text-decoration: none;">${val}</a>`;
                }
            },
            {title: "Group", field: "group", sorter: "string", width: 140,
                formatter: function(cell) { return groupBadge(cell.getValue()); },
                headerFilter: "list",
                headerFilterParams: {
                    values: {"": "All", "high": "High", "med": "Med", "low": "Low", "dry": "Dry", "ram": "Ram", "ready": "Ready for Birth"},
                    clearable: true,
                },
            },
            {title: "Active", field: "is_active", formatter: "tickCross", width: 80, hozAlign: "center", editor: "tickCross"},
            {
              title: "",
              formatter: () => '<button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>',
              width: 60,
              hozAlign: "center",
              headerSort: false,
              cellClick: async (e, cell) => {
                  const rowData = cell.getRow().getData();
                  if (!confirm(`Are you sure you want to delete sheep "${rowData.earing}"?`)) return;

                  const response = await fetch(`/api/sheep/${rowData.id}/`, {
                      method: "DELETE",
                      headers: { "X-CSRFToken": csrfToken }
                  });

                  if (response.ok) {
                      cell.getRow().delete();
                  } else {
                      alert("Failed to delete sheep.");
                  }
              }
            }
        ],
    });

    table.on("cellEdited", function(cell) {
        inlineEdit(cell, '/api/sheep/');
    });

    document.getElementById('btn-recalculate').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Recalculating...';
        try {
            const res = await fetch("{% url 'groups-recalculate' %}", {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken },
            });
            if (res.ok) {
                await table.replaceData();
            } else {
                alert('Recalculation failed.');
            }
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Recalculate Groups';
        }
    });
</script>
{% endblock %}
